name: Build & Publish JetPos

on:
  push:
    tags:
      - 'v*' # v1.1.5 gibi bir tag atanıp pushlandığında çalışır
  workflow_dispatch: # Manuel olarak da tetiklenebilir

jobs:
  release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }} # Job seviyesinde tanımlayalım
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Client Dependencies
        run: npm install --prefix client --legacy-peer-deps

      - name: Build & Publish Electron App
        run: npm run publish:client
        env:
          NODE_OPTIONS: "--max-old-space-size=4096" # Bellek hatasını önleyelim

      - name: Upload Build Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: JetPos-Windows-EXE
          path: |
            client/dist/*.exe
            client/dist/*.yml
            client/dist/*.blockmap
